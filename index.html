<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador de Ajedrez</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%); color: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px 20px; text-align: center; background: rgba(0,0,0,0.3); border-bottom: 2px solid #00d4ff; }
        .header h1 { font-size: 2em; background: linear-gradient(135deg, #00d4ff, #0099ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .main-container { display: flex; flex: 1; gap: 20px; padding: 20px; overflow: hidden; }
        .board-section { display: flex; flex-direction: column; gap: 15px; flex: 0 0 auto; }
        .board-and-eval { display: flex; gap: 15px; align-items: flex-start; }
        .chessboard { display: grid; grid-template-columns: repeat(8,1fr); grid-template-rows: repeat(8,1fr); gap: 0; background: #2a2a3e; border: 3px solid #00d4ff; border-radius: 8px; overflow: hidden; width: 600px; height: 600px; flex-shrink: 0; }
        .square { display: flex; align-items: center; justify-content: center; font-size: 3.2em; cursor: pointer; user-select: none; transition: all 0.15s; }
        .square:hover { filter: brightness(1.1); }
        .square.light { background: #f0d9b5; }
        .square.dark { background: #b58863; }
        .square.selected { background: #baca44 !important; box-shadow: inset 0 0 20px rgba(186,202,68,0.8); }
        .square.highlight { background: rgba(186,202,68,0.6) !important; }
        .square.last-move { background: rgba(255,255,100,0.4) !important; }
        .eval-bar-vertical { display: flex; flex-direction: column; width: 100px; height: 600px; background: #2a2a3e; border: 3px solid #00d4ff; border-radius: 8px; padding: 8px 4px; gap: 8px; align-items: center; flex-shrink: 0; }
        .eval-label { font-size: 0.7em; color: #00d4ff; font-weight: 600; text-align: center; }
        .eval-bar-container { flex: 1; width: 100%; background: #1a1a2e; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column-reverse; border: 1px solid #444; }
        .eval-bar-fill { width: 100%; background: linear-gradient(180deg, #f0f0f0 0%, #d0d0d0 100%); display: flex; align-items: flex-end; justify-content: center; font-size: 0.55em; font-weight: 700; color: #000; transition: height 0.3s ease; }
        .eval-bar-fill.black-advantage { background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); color: #fff; }
        .eval-score { font-size: 0.75em; color: #00d4ff; font-weight: 700; text-align: center; }
        .eval-info { font-size: 0.65em; color: #00ff00; font-weight: 600; text-align: center; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; background: rgba(0,212,255,0.05); padding: 15px; border-radius: 8px; border: 1px solid rgba(0,212,255,0.2); max-width: 700px; }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        .control-group label { font-size: 0.8em; color: #00d4ff; font-weight: 600; }
        select, button { padding: 10px 12px; background: #0099ff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: 600; transition: all 0.3s; }
        select:hover, button:hover { background: #00d4ff; transform: translateY(-2px); }
        button.full-width { grid-column: span 2; }
        button.secondary { background: #444; }
        button.secondary:hover { background: #555; }
        .panels-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex: 1; overflow: hidden; min-height: 0; }
        .stats-panel { background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-radius: 8px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .coach-message { background: rgba(0,212,255,0.1); border-left: 4px solid #00d4ff; padding: 12px; border-radius: 6px; font-size: 0.9em; }
        .coach-message.good { border-left-color: #00ff00; background: rgba(0,255,0,0.05); }
        .coach-message.bad { border-left-color: #ff0000; background: rgba(255,0,0,0.05); }
        .stats-quick { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; font-size: 0.8em; }
        .stat-quick-box { background: rgba(0,212,255,0.1); padding: 10px; border-radius: 6px; text-align: center; border: 1px solid rgba(0,212,255,0.2); }
        .stat-quick-box strong { color: #00d4ff; display: block; font-size: 1.2em; margin-bottom: 3px; }
        .move-history { flex: 1; overflow-y: auto; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 6px; border: 1px solid rgba(0,212,255,0.2); font-size: 0.8em; }
        .move-item { padding: 6px; background: rgba(0,212,255,0.1); margin-bottom: 4px; border-radius: 4px; border-left: 3px solid #00d4ff; }
        h2 { font-size: 1.1em; color: #00d4ff; margin: 0; }
        @media (max-width: 1200px) { .main-container { flex-direction: column; } .panels-container { grid-template-columns: 1fr; max-height: 400px; } .eval-bar-vertical { display: none; } }
        @media (max-width: 768px) { .chessboard { width: 100%; max-width: 450px; height: auto; aspect-ratio: 1; } .square { font-size: 2em; } .controls { grid-template-columns: 1fr 1fr; } .stats-quick { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div class="header"><h1>♟️ Ajedrez - Minimax Real</h1></div>
    <div class="main-container">
        <div class="board-section">
            <div class="board-and-eval">
                <div class="chessboard" id="board"></div>
                <div class="eval-bar-vertical">
                    <div class="eval-label">Evaluación</div>
                    <div class="eval-bar-container"><div class="eval-bar-fill" id="evalBarFill"></div></div>
                    <div class="eval-score" id="evalScore">0.00</div>
                    <div class="eval-info" id="evalInfo">50%</div>
                </div>
            </div>
            <div class="controls">
                <div class="control-group"><label>Modo</label><select id="gameMode"><option value="free">Libre</option><option value="vs-ia" selected>vs IA</option></select></div>
                <div class="control-group"><label>Nivel</label><select id="difficulty"><option value="2">Novato</option><option value="3" selected>Normal</option><option value="4">Difícil</option></select></div>
                <button onclick="resetGame()" class="full-width">🔄 Nueva</button>
                <button onclick="requestHint()" class="full-width">💡 Pista</button>
            </div>
        </div>
        <div class="panels-container">
            <div class="stats-panel">
                <h2>🎯 Juego</h2>
                <div id="coachMessage" class="coach-message">Juega contra IA con búsqueda Minimax real.</div>
                <div class="stats-quick">
                    <div class="stat-quick-box"><strong id="moveCount">0</strong><span>Movs</span></div>
                    <div class="stat-quick-box"><strong id="accuracy">0%</strong><span>Precisión</span></div>
                    <div class="stat-quick-box"><strong id="goodMoves">0</strong><span>Buenos</span></div>
                    <div class="stat-quick-box"><strong id="badMoves">0</strong><span>Errores</span></div>
                </div>
                <div style="margin-top: auto; display: flex; gap: 10px;">
                    <button onclick="undoMove()" class="secondary" style="flex: 1;">↶ Deshacer</button>
                    <button onclick="flipBoard()" class="secondary" style="flex: 1;">🔄 Girar</button>
                </div>
            </div>
            <div class="stats-panel">
                <h2>📜 Movimientos</h2>
                <div class="move-history" id="moveHistory"><p style="color: #888; text-align: center;">Movimientos aquí...</p></div>
            </div>
        </div>
    </div>
    <script>
        const game = new Chess();
        let selectedSquare = null, highlights = [], moveCount = 0, goodMoves = 0, badMoves = 0;
        let boardFlipped = false, aiThinking = false, lastEval = 0;

        const pieces = {'P':'♙','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','p':'♟','r':'♜','n':'♞','b':'♝','q':'♛','k':'♚'};

        function evaluatePos() {
            const board = game.board();
            let score = 0;
            const vals = {'p':1,'n':3,'b':3.25,'r':5,'q':9};
            for(let row of board) for(let p of row) if(p) score += p.color==='w' ? (vals[p.type]||0) : -(vals[p.type]||0);
            return score;
        }

        function minimax(depth, isMax) {
            if(depth === 0 || game.game_over()) return evaluatePos();
            const moves = game.moves();
            if(isMax) {
                let max = -Infinity;
                for(let m of moves.slice(0, Math.min(20, moves.length))) {
                    game.move(m);
                    max = Math.max(max, minimax(depth-1, false));
                    game.undo();
                }
                return max;
            } else {
                let min = Infinity;
                for(let m of moves.slice(0, Math.min(20, moves.length))) {
                    game.move(m);
                    min = Math.min(min, minimax(depth-1, true));
                    game.undo();
                }
                return min;
            }
        }

        function getBestMove(depth) {
            const moves = game.moves({verbose:true});
            if(!moves.length) return null;
            let best = moves[0], bestEval = -Infinity;
            for(let m of moves.slice(0, Math.min(25, moves.length))) {
                game.move(m);
                const ev = minimax(depth-1, false);
                game.undo();
                if(ev > bestEval) { bestEval = ev; best = m; }
            }
            return best;
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const row = boardFlipped ? 7-r : r;
                    const col = boardFlipped ? 7-c : c;
                    const sq = String.fromCharCode(97+col) + (8-row);
                    const piece = game.get(sq);
                    const el = document.createElement('div');
                    el.className = 'square ' + ((row+col)%2===0 ? 'light' : 'dark');
                    if(selectedSquare === sq) el.classList.add('selected');
                    if(highlights.includes(sq)) el.classList.add('highlight');
                    if(piece) {
                        el.textContent = pieces[piece.type];
                        el.style.color = piece.color === 'w' ? '#fff' : '#000';
                    }
                    el.onclick = () => handleClick(sq);
                    boardEl.appendChild(el);
                }
            }
        }

        function handleClick(sq) {
            if(aiThinking || game.game_over()) return;
            const piece = game.get(sq);
            if(selectedSquare && piece && game.get(selectedSquare).color === piece.color) {
                selectedSquare = sq;
                highlights = game.moves({square:sq, verbose:true}).map(m => m.to);
            } else if(selectedSquare) {
                const move = game.move({from:selectedSquare, to:sq, promotion:'q'});
                if(move) {
                    moveCount++;
                    evaluateMove(move);
                    selectedSquare = null;
                    highlights = [];
                    updateUI();
                    if(document.getElementById('gameMode').value === 'vs-ia' && !game.game_over()) {
                        aiThinking = true;
                        setTimeout(makeAIMove, 800);
                    }
                } else {
                    selectedSquare = null;
                    highlights = [];
                }
            } else if(piece && piece.color === game.turn()) {
                selectedSquare = sq;
                highlights = game.moves({square:sq, verbose:true}).map(m => m.to);
            }
            renderBoard();
        }

        function evaluateMove(move) {
            const ev = evaluatePos();
            let q = 'good';
            if(ev - lastEval > 1) q = 'excellent';
            else if(ev - lastEval < -1) q = 'blunder';
            if(q === 'excellent' || q === 'good') goodMoves++;
            else badMoves++;
            lastEval = ev;
        }

        function makeAIMove() {
            if(game.game_over()) { aiThinking = false; return; }
            const depths = {2:2, 3:3, 4:4};
            const d = parseInt(document.getElementById('difficulty').value);
            const m = getBestMove(depths[d] || 3);
            if(m) { game.move(m); moveCount++; }
            updateUI();
            aiThinking = false;
            if(game.game_over()) alert('Partida terminada');
        }

        function updateUI() {
            renderBoard();
            const score = evaluatePos();
            const pct = Math.max(0, Math.min(100, 50 + score * 10));
            document.getElementById('evalBarFill').style.height = pct + '%';
            document.getElementById('evalBarFill').textContent = Math.abs(score).toFixed(2);
            document.getElementById('evalBarFill').className = score > 0.3 ? 'eval-bar-fill' : 'eval-bar-fill black-advantage';
            document.getElementById('evalScore').textContent = score.toFixed(2);
            document.getElementById('evalInfo').textContent = Math.round(50 + Math.min(Math.max(score*10,-50),50)) + '%';
            document.getElementById('moveCount').textContent = moveCount;
            const tot = goodMoves + badMoves;
            document.getElementById('accuracy').textContent = tot > 0 ? Math.round(goodMoves/tot*100) + '%' : '0%';
            document.getElementById('goodMoves').textContent = goodMoves;
            document.getElementById('badMoves').textContent = badMoves;
            const hist = document.getElementById('moveHistory');
            hist.innerHTML = '';
            const history = game.history({verbose:true});
            if(history.length === 0) hist.innerHTML = '<p style="color: #888;">Movimientos aquí...</p>';
            else history.forEach((mv, i) => {
                const d = document.createElement('div');
                d.className = 'move-item';
                d.textContent = (i%2===0 ? '⚪' : '⚫') + ' ' + (Math.floor(i/2)+1) + '. ' + mv.san;
                hist.appendChild(d);
            });
        }

        function resetGame() { game.reset(); selectedSquare = null; highlights = []; moveCount = 0; goodMoves = 0; badMoves = 0; aiThinking = false; lastEval = 0; updateUI(); }
        function undoMove() { if(!aiThinking) { game.undo(); game.undo(); moveCount = Math.max(0, moveCount-2); updateUI(); } }
        function flipBoard() { boardFlipped = !boardFlipped; renderBoard(); }
        function requestHint() { if(!game.game_over() && !aiThinking) { const m = getBestMove(4); if(m) { selectedSquare = m.from; highlights = [m.to]; renderBoard(); } } }

        renderBoard();
        updateUI();
    </script>
</body>
</html>
