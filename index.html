<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador de Ajedrez Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 15px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid #00d4ff;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 2em;
            margin: 0;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .main-container { display: flex; flex: 1; gap: 20px; padding: 20px; overflow: hidden; }
        .board-section { display: flex; flex-direction: column; gap: 15px; flex: 0 0 auto; }
        .board-and-eval { display: flex; gap: 15px; align-items: flex-start; }
        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 0;
            background: #2a2a3e;
            border: 3px solid #00d4ff;
            border-radius: 8px;
            overflow: hidden;
            width: 600px;
            height: 600px;
            flex-shrink: 0;
        }
        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2em;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }
        .square:hover { filter: brightness(1.1); }
        .square.light { background: #f0d9b5; }
        .square.dark { background: #b58863; }
        .square.selected { background: #baca44 !important; box-shadow: inset 0 0 20px rgba(186, 202, 68, 0.8); }
        .square.highlight { background: rgba(186, 202, 68, 0.6) !important; }
        .square.last-move { background: rgba(255, 255, 100, 0.4) !important; }
        
        .eval-bar-vertical {
            display: flex;
            flex-direction: column;
            width: 60px;
            height: 600px;
            background: #2a2a3e;
            border: 3px solid #00d4ff;
            border-radius: 8px;
            overflow: hidden;
            padding: 8px 4px;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        .eval-label { font-size: 0.75em; color: #00d4ff; font-weight: 600; text-align: center; line-height: 1.2; }
        .eval-bar-container {
            flex: 1;
            width: 100%;
            background: #1a1a2e;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            border: 1px solid #444;
        }
        .eval-bar-fill {
            width: 100%;
            background: linear-gradient(180deg, #0099ff 0%, #00d4ff 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 3px;
            font-size: 0.65em;
            font-weight: 700;
            color: #000;
            transition: height 0.5s ease;
        }
        .eval-bar-fill.white-advantage { background: linear-gradient(180deg, #f0f0f0 0%, #d0d0d0 100%); }
        .eval-bar-fill.black-advantage { background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); color: #fff; }
        .eval-score { font-size: 0.7em; color: #00d4ff; font-weight: 700; margin-top: 4px; text-align: center; }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            background: rgba(0, 212, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            max-width: 600px;
        }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        .control-group label { font-size: 0.8em; color: #00d4ff; font-weight: 600; }
        select, button {
            padding: 10px 12px;
            background: #0099ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
        }
        select:hover, button:hover { background: #00d4ff; transform: translateY(-2px); }
        button.full-width { grid-column: span 2; }
        button.secondary { background: #444; }
        button.secondary:hover { background: #555; }
        
        .panels-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        .stats-panel {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .coach-message {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9em;
            line-height: 1.5;
        }
        .coach-message strong { color: #00d4ff; display: block; margin-bottom: 5px; }
        .coach-message.good { border-left-color: #00ff00; background: rgba(0, 255, 0, 0.05); }
        .coach-message.bad { border-left-color: #ff0000; background: rgba(255, 0, 0, 0.05); }
        
        .stats-quick {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            font-size: 0.8em;
        }
        .stat-quick-box {
            background: rgba(0, 212, 255, 0.1);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        .stat-quick-box strong { color: #00d4ff; display: block; font-size: 1.2em; margin-bottom: 3px; }
        .stat-quick-box span { font-size: 0.75em; }
        
        .move-history {
            flex: 1;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            font-size: 0.8em;
        }
        .move-item {
            padding: 6px;
            background: rgba(0, 212, 255, 0.1);
            margin-bottom: 4px;
            border-radius: 4px;
            border-left: 3px solid #00d4ff;
        }
        h2 { font-size: 1.1em; color: #00d4ff; margin: 0; }
        h3 { font-size: 0.95em; color: #fff; margin: 0; }
        
        .analysis-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .analysis-modal.active { display: flex; }
        .analysis-content {
            background: #1e1e2e;
            border: 2px solid #00d4ff;
            border-radius: 12px;
            padding: 30px;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            gap: 20px;
            display: flex;
            flex-direction: column;
        }
        .analysis-content h2 { font-size: 1.5em; }
        .analysis-move { background: rgba(0, 212, 255, 0.1); padding: 12px; border-radius: 6px; border-left: 3px solid #00d4ff; }
        
        @media (max-width: 1200px) {
            .main-container { flex-direction: column; }
            .panels-container { grid-template-columns: 1fr; max-height: 400px; }
            .eval-bar-vertical { display: none; }
        }
        @media (max-width: 768px) {
            .chessboard { max-width: 100%; }
            .controls { grid-template-columns: 1fr 1fr; }
            .stats-quick { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>♟️ Entrenador de Ajedrez Profesional</h1>
    </div>

    <div class="main-container">
        <div class="board-section">
            <div class="board-and-eval">
                <div class="chessboard" id="board"></div>
                <div class="eval-bar-vertical">
                    <div class="eval-label">Evaluación</div>
                    <div class="eval-bar-container">
                        <div class="eval-bar-fill" id="evalBarFill"></div>
                    </div>
                    <div class="eval-score" id="evalScore">50%</div>
                </div>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label>Modo</label>
                    <select id="gameMode" onchange="resetGame()">
                        <option value="coach">Entrenador</option>
                        <option value="vs-ia">vs IA</option>
                        <option value="free">Libre</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Nivel</label>
                    <select id="difficulty">
                        <option value="1">Novato</option>
                        <option value="2">Intermedio</option>
                        <option value="3" selected>Avanzado</option>
                        <option value="4">Experto</option>
                        <option value="5">Maestro</option>
                    </select>
                </div>
                <button onclick="resetGame()" class="full-width">🔄 Nueva</button>
                <button onclick="requestHint()" class="full-width">💡 Pista</button>
            </div>
        </div>

        <div class="panels-container">
            <div class="stats-panel">
                <h2>🎯 Entrenador</h2>
                <div id="coachMessage" class="coach-message">
                    <strong>¡Bienvenido!</strong>
                    Realiza tu primer movimiento.
                </div>
                <div class="stats-quick">
                    <div class="stat-quick-box">
                        <strong id="moveCount">0</strong>
                        <span>Movs</span>
                    </div>
                    <div class="stat-quick-box">
                        <strong id="accuracy">0%</strong>
                        <span>Precisión</span>
                    </div>
                    <div class="stat-quick-box">
                        <strong id="goodMoves">0</strong>
                        <span>Buenos</span>
                    </div>
                    <div class="stat-quick-box">
                        <strong id="badMoves">0</strong>
                        <span>Malos</span>
                    </div>
                </div>
                <div style="margin-top: auto; display: flex; gap: 10px;">
                    <button onclick="undoMove()" class="secondary" style="flex: 1;">↶ Deshacer</button>
                    <button onclick="flipBoard()" class="secondary" style="flex: 1;">🔄 Girar</button>
                </div>
            </div>

            <div class="stats-panel">
                <h2>📝 Movimientos</h2>
                <div class="move-history" id="moveHistory">
                    <p style="color: #888; text-align: center;">Movimientos aquí...</p>
                </div>
                <button onclick="showAnalysis()" class="secondary" style="width: 100%;">📊 Análisis Detallado</button>
            </div>
        </div>
    </div>

    <div id="analysisModal" class="analysis-modal">
        <div class="analysis-content">
            <h2>📊 Análisis de Posición</h2>
            <div id="analysisDetails"></div>
            <button onclick="closeAnalysis()" style="width: 100%; padding: 12px;">Cerrar</button>
        </div>
    </div>

    <script>
        const game = new Chess();
        let selectedSquare = null;
        let highlights = [];
        let lastFromSquare = null;
        let lastToSquare = null;
        let moveCount = 0;
        let goodMoves = 0;
        let badMoves = 0;
        let boardFlipped = false;
        let aiThinking = false;
        let moveHistory = [];

        const pieceSymbols = {
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔',
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚'
        };

        const coachMessages = {
            excellent: ["¡Perfecto! Eso es lo mejor que podías hacer.", "Increíble jugada, mantiene ventaja decisiva."],
            good: ["Buen movimiento, mejora tu posición.", "Sigue así, buena elección estratégica."],
            inaccuracy: ["Podría ser mejor, pero sigue siendo viable.", "No es malo, pero hay alternativas mejores."],
            mistake: ["Cuidado, pierdes ventaja con esto.", "No es la mejor opción aquí."],
            blunder: ["¡Error grave! Eso te pone en desventaja.", "Malo, muy malo. Eso pierde material."]
        };

        // ============= EVALUACIÓN POSICIONAL AVANZADA =============
        const pieceValues = { 'p': 1, 'n': 3, 'b': 3.25, 'r': 5, 'q': 9, 'k': 0 };
        const positionBonus = {
            'p': [0,0,0,0,0,0,0,0, 50,50,50,50,50,50,50,50, 10,10,20,30,30,20,10,10, 5,5,10,27,27,10,5,5, 0,0,0,25,25,0,0,0, 5,-5,-10,0,0,-10,-5,5, 5,10,10,-20,-20,10,10,5, 0,0,0,0,0,0,0,0],
            'n': [-50,-40,-30,-30,-30,-30,-40,-50, -40,-20,0,0,0,0,-20,-40, -30,0,10,15,15,10,0,-30, -30,5,15,20,20,15,5,-30, -30,0,15,20,20,15,0,-30, -30,5,10,15,15,10,5,-30, -40,-20,0,5,5,0,-20,-40, -50,-40,-30,-30,-30,-30,-40,-50],
            'b': [-20,-10,-10,-10,-10,-10,-10,-20, -10,0,0,0,0,0,0,-10, -10,0,5,10,10,5,0,-10, -10,5,5,10,10,5,5,-10, -10,0,10,10,10,10,0,-10, -10,10,10,10,10,10,10,-10, -10,5,0,0,0,0,5,-10, -20,-10,-10,-10,-10,-10,-10,-20],
            'r': [0,0,0,0,0,0,0,0, 5,10,10,10,10,10,10,5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, 0,0,0,5,5,0,0,0],
            'q': [-20,-10,-10,-5,-5,-10,-10,-20, -10,0,0,0,0,0,0,-10, -10,0,5,5,5,5,0,-10, -5,0,5,5,5,5,0,-5, 0,0,5,5,5,5,0,0, -10,5,5,5,5,5,0,-10, -10,0,5,0,0,0,0,-10, -20,-10,-10,-5,-5,-10,-10,-20],
            'k': [-30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -20,-30,-30,-40,-40,-30,-30,-20, -10,-20,-20,-20,-20,-20,-20,-10, 20,20,0,0,0,0,20,20, 20,30,10,0,0,10,30,20]
        };

        function evaluatePosition() {
            let score = 0;
            const board = game.board();
            
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const piece = board[i][j];
                    if (!piece) continue;
                    
                    const baseValue = pieceValues[piece.type];
                    const index = i * 8 + j;
                    let bonus = 0;
                    
                    if (positionBonus[piece.type]) {
                        bonus = positionBonus[piece.type][index] / 100;
                    }
                    
                    const value = baseValue + bonus;
                    score += piece.color === 'w' ? value : -value;
                }
            }
            
            // Bonus por movilidad
            const moves = game.moves().length;
            score += game.turn() === 'w' ? moves * 0.1 : -moves * 0.1;
            
            return score;
        }

        // ============= MINIMAX CON PROFUNDIDAD VARIABLE =============
        function minimax(depth, alpha, beta, isMaximizing) {
            if (depth === 0 || game.game_over()) {
                return evaluatePosition();
            }
            
            const moves = game.moves({ verbose: true });
            
            if (isMaximizing) {
                let maxEval = -Infinity;
                for (let move of moves) {
                    game.move(move);
                    const eval_score = minimax(depth - 1, alpha, beta, false);
                    game.undo();
                    maxEval = Math.max(maxEval, eval_score);
                    alpha = Math.max(alpha, eval_score);
                    if (beta <= alpha) break;
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let move of moves) {
                    game.move(move);
                    const eval_score = minimax(depth - 1, alpha, beta, true);
                    game.undo();
                    minEval = Math.min(minEval, eval_score);
                    beta = Math.min(beta, eval_score);
                    if (beta <= alpha) break;
                }
                return minEval;
            }
        }

        function getBestMove(depth = 4) {
            const moves = game.moves({ verbose: true });
            if (!moves.length) return null;

            let bestMove = moves[0];
            let bestScore = -Infinity;

            for (let move of moves) {
                game.move(move);
                const score = minimax(depth - 1, -Infinity, Infinity, false);
                game.undo();

                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            }
            return bestMove;
        }

        // ============= UI =============
        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const r = boardFlipped ? 7 - row : row;
                    const c = boardFlipped ? 7 - col : col;
                    const square = String.fromCharCode(97 + c) + (8 - r);
                    const piece = game.get(square);

                    const squareEl = document.createElement('div');
                    squareEl.className = 'square ' + ((r + c) % 2 === 0 ? 'light' : 'dark');

                    if (selectedSquare === square) squareEl.classList.add('selected');
                    if (highlights.includes(square)) squareEl.classList.add('highlight');
                    if ((square === lastFromSquare || square === lastToSquare) && moveCount > 0) {
                        squareEl.classList.add('last-move');
                    }

                    if (piece) {
                        squareEl.textContent = pieceSymbols[piece.type];
                        squareEl.style.color = piece.color === 'w' ? '#fff' : '#000';
                        squareEl.style.textShadow = piece.color === 'w' ? '2px 2px 4px #000' : '1px 1px 3px #fff';
                    }

                    squareEl.addEventListener('click', () => handleSquareClick(square));
                    boardEl.appendChild(squareEl);
                }
            }
        }

        function handleSquareClick(square) {
            if (aiThinking || game.game_over()) return;

            const piece = game.get(square);

            if (selectedSquare && piece && game.get(selectedSquare).color === piece.color) {
                selectedSquare = square;
                highlights = game.moves({ square, verbose: true }).map(m => m.to);
            } else if (selectedSquare) {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });

                if (move) {
                    lastFromSquare = selectedSquare;
                    lastToSquare = square;
                    moveCount++;
                    selectedSquare = null;
                    highlights = [];

                    evaluateMoveQuality(move);

                    const mode = document.getElementById('gameMode').value;
                    if ((mode === 'vs-ia' || mode === 'coach') && !game.game_over()) {
                        aiThinking = true;
                        setTimeout(makeAIMove, 1500);
                    }

                    updateUI();
                } else {
                    selectedSquare = null;
                    highlights = [];
                }
            } else if (piece && piece.color === game.turn()) {
                selectedSquare = square;
                highlights = game.moves({ square, verbose: true }).map(m => m.to);
            }

            renderBoard();
        }

        function evaluateMoveQuality(move) {
            const best = getBestMove(3);
            let quality = 'blunder';
            let message = '';

            if (best && move.san === best.san) {
                quality = 'excellent';
                goodMoves++;
                message = coachMessages.excellent[Math.floor(Math.random() * coachMessages.excellent.length)];
            } else {
                const scoreBefore = evaluatePosition();
                game.move(move);
                const scoreAfter = evaluatePosition();
                game.undo();
                const diff = scoreAfter - scoreBefore;

                if (diff > 0.5) {
                    quality = 'good';
                    goodMoves++;
                    message = coachMessages.good[Math.floor(Math.random() * coachMessages.good.length)];
                } else if (diff > -0.5) {
                    quality = 'inaccuracy';
                    badMoves++;
                    message = coachMessages.inaccuracy[Math.floor(Math.random() * coachMessages.inaccuracy.length)];
                } else if (diff > -2) {
                    quality = 'mistake';
                    badMoves++;
                    message = coachMessages.mistake[Math.floor(Math.random() * coachMessages.mistake.length)];
                } else {
                    quality = 'blunder';
                    badMoves++;
                    message = coachMessages.blunder[Math.floor(Math.random() * coachMessages.blunder.length)];
                }
            }

            const mode = document.getElementById('gameMode').value;
            if (mode !== 'free') {
                const coachMsg = document.getElementById('coachMessage');
                coachMsg.textContent = message;
                coachMsg.className = 'coach-message ' + (quality === 'excellent' || quality === 'good' ? 'good' : 'bad');
            }

            moveHistory.push({ move: move.san, quality });
        }

        function makeAIMove() {
            if (game.game_over()) { aiThinking = false; return; }

            const difficulty = parseInt(document.getElementById('difficulty').value);
            const depthMap = { 1: 3, 2: 4, 3: 5, 4: 6, 5: 7 };
            const depth = depthMap[difficulty];

            const bestMove = getBestMove(depth);
            if (bestMove) {
                game.move(bestMove);
                lastFromSquare = bestMove.from;
                lastToSquare = bestMove.to;
                moveCount++;
            }

            updateUI();
            aiThinking = false;

            if (game.game_over()) {
                setTimeout(() => alert('🏁 Partida terminada\n\nPrecisión: ' + document.getElementById('accuracy').textContent), 300);
            }
        }

        function updateUI() {
            renderBoard();
            updateEvalBar();
            updateMoveHistory();
            updateStats();
        }

        function updateEvalBar() {
            const score = evaluatePosition();
            const percentage = Math.max(0, Math.min(100, 50 + score * 8));
            const fillEl = document.getElementById('evalBarFill');
            fillEl.style.height = percentage + '%';
            fillEl.textContent = Math.round(percentage) + '%';
            document.getElementById('evalScore').textContent = Math.round(percentage) + '%';

            if (percentage > 55) fillEl.className = 'eval-bar-fill white-advantage';
            else if (percentage < 45) fillEl.className = 'eval-bar-fill black-advantage';
            else fillEl.className = 'eval-bar-fill';
        }

        function updateMoveHistory() {
            const hist = document.getElementById('moveHistory');
            hist.innerHTML = '';
            const history = game.history({ verbose: true });
            history.forEach((move, idx) => {
                const div = document.createElement('div');
                div.className = 'move-item';
                const moveNum = Math.floor(idx / 2) + 1;
                const color = idx % 2 === 0 ? '⚪' : '⚫';
                const quality = moveHistory[idx]?.quality || '';
                div.textContent = `${color} ${moveNum}. ${move.san} ${quality}`;
                hist.appendChild(div);
            });
        }

        function updateStats() {
            document.getElementById('moveCount').textContent = moveCount;
            const total = goodMoves + badMoves;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round((goodMoves / total) * 100) + '%' : '0%';
            document.getElementById('goodMoves').textContent = goodMoves;
            document.getElementById('badMoves').textContent = badMoves;
        }

        function resetGame() {
            game.reset();
            selectedSquare = null;
            highlights = [];
            lastFromSquare = null;
            lastToSquare = null;
            moveCount = 0;
            goodMoves = 0;
            badMoves = 0;
            aiThinking = false;
            moveHistory = [];

            document.getElementById('coachMessage').innerHTML = '<strong>¡Bienvenido!</strong> Realiza tu primer movimiento.';
            updateUI();
        }

        function undoMove() {
            if (aiThinking) return;
            game.undo();
            game.undo();
            moveCount = Math.max(0, moveCount - 2);
            moveHistory.pop();
            moveHistory.pop();
            updateUI();
        }

        function flipBoard() {
            boardFlipped = !boardFlipped;
            renderBoard();
        }

        function requestHint() {
            if (game.game_over() || aiThinking) return;
            const best = getBestMove(5);
            if (best) {
                selectedSquare = best.from;
                highlights = [best.to];
                renderBoard();
                const coachMsg = document.getElementById('coachMessage');
                coachMsg.innerHTML = '<strong>💡 Pista:</strong> El mejor movimiento es ' + best.san;
                coachMsg.className = 'coach-message good';
            }
        }

        function showAnalysis() {
            const modal = document.getElementById('analysisModal');
            const details = document.getElementById('analysisDetails');
            
            const score = evaluatePosition();
            let position = '';
            if (score > 3) position = '⚪ Blancas ganando';
            else if (score > 1) position = '⚪ Blancas en ventaja';
            else if (score > 0.5) position = '⚪ Blancas ligeramente mejor';
            else if (score > -0.5) position = '= Posición equilibrada';
            else if (score > -1) position = '⚫ Negras ligeramente mejor';
            else if (score > -3) position = '⚫ Negras en ventaja';
            else position = '⚫ Negras ganando';

            let winChance = 50 + (score * 12);
            winChance = Math.max(0, Math.min(100, winChance));

            const history = game.history({ verbose: true });
            let analysisHTML = `
                <div class="analysis-move">
                    <strong>Evaluación Actual:</strong><br>
                    ${position}<br>
                    <strong>Puntuación:</strong> ${score.toFixed(2)}<br>
                    <strong>Probabilidad de Victoria (Blancas):</strong> ${Math.round(winChance)}%
                </div>
            `;

            const moves = game.moves({ verbose: true });
            if (moves.length > 0) {
                analysisHTML += '<div class="analysis-move"><strong>Mejores movimientos:</strong><br>';
                const topMoves = [];
                for (let move of moves.slice(0, 5)) {
                    game.move(move);
                    const moveScore = evaluatePosition();
                    game.undo();
                    topMoves.push({ move, score: moveScore });
                }
                topMoves.sort((a, b) => b.score - a.score);
                topMoves.forEach((m, i) => {
                    analysisHTML += `${i+1}. <strong>${m.move.san}</strong> (${m.move.score ? m.move.score.toFixed(2) : '?'})<br>`;
                });
                analysisHTML += '</div>';
            }

            details.innerHTML = analysisHTML;
            modal.classList.add('active');
        }

        function closeAnalysis() {
            document.getElementById('analysisModal').classList.remove('active');
        }

        renderBoard();
        updateUI();
    </script>
</body>
</html>
