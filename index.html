<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador de Ajedrez Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 15px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid #00d4ff;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 2em;
            margin: 0;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }

        .board-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 0 0 auto;
        }

        .board-and-eval {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 0;
            background: #2a2a3e;
            border: 3px solid #00d4ff;
            border-radius: 8px;
            overflow: hidden;
            width: 600px;
            height: 600px;
            flex-shrink: 0;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2em;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }

        .square:hover {
            filter: brightness(1.1);
        }

        .square.light {
            background: #f0d9b5;
        }

        .square.dark {
            background: #b58863;
        }

        .square.selected {
            background: #baca44 !important;
            box-shadow: inset 0 0 20px rgba(186, 202, 68, 0.8);
        }

        .square.highlight {
            background: rgba(186, 202, 68, 0.6) !important;
        }

        .square.last-move {
            background: rgba(255, 255, 100, 0.4) !important;
        }

        .eval-bar-vertical {
            display: flex;
            flex-direction: column;
            width: 100px;
            height: 600px;
            background: #2a2a3e;
            border: 3px solid #00d4ff;
            border-radius: 8px;
            overflow: hidden;
            padding: 8px 4px;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .eval-label {
            font-size: 0.7em;
            color: #00d4ff;
            font-weight: 600;
            text-align: center;
            line-height: 1.1;
        }

        .eval-bar-container {
            flex: 1;
            width: 100%;
            background: #1a1a2e;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            border: 1px solid #444;
        }

        .eval-bar-fill {
            width: 100%;
            background: linear-gradient(180deg, #f0f0f0 0%, #d0d0d0 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 0.55em;
            font-weight: 700;
            color: #000;
            transition: height 0.3s ease;
        }

        .eval-bar-fill.black-advantage {
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            color: #fff;
        }

        .eval-score {
            font-size: 0.75em;
            color: #00d4ff;
            font-weight: 700;
            text-align: center;
            line-height: 1.1;
        }

        .eval-info {
            font-size: 0.65em;
            color: #00ff00;
            font-weight: 600;
            text-align: center;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            background: rgba(0, 212, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            max-width: 700px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.8em;
            color: #00d4ff;
            font-weight: 600;
        }

        select, button {
            padding: 10px 12px;
            background: #0099ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
        }

        select:hover, button:hover {
            background: #00d4ff;
            transform: translateY(-2px);
        }

        button.full-width {
            grid-column: span 2;
        }

        button.secondary {
            background: #444;
        }

        button.secondary:hover {
            background: #555;
        }

        .panels-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        .stats-panel {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .coach-message {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .coach-message strong {
            color: #00d4ff;
            display: block;
            margin-bottom: 5px;
        }

        .coach-message.good {
            border-left-color: #00ff00;
            background: rgba(0, 255, 0, 0.05);
        }

        .coach-message.bad {
            border-left-color: #ff0000;
            background: rgba(255, 0, 0, 0.05);
        }

        .stats-quick {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            font-size: 0.8em;
        }

        .stat-quick-box {
            background: rgba(0, 212, 255, 0.1);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .stat-quick-box strong {
            color: #00d4ff;
            display: block;
            font-size: 1.2em;
            margin-bottom: 3px;
        }

        .stat-quick-box span {
            font-size: 0.75em;
        }

        .move-history {
            flex: 1;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            font-size: 0.8em;
        }

        .move-item {
            padding: 6px;
            background: rgba(0, 212, 255, 0.1);
            margin-bottom: 4px;
            border-radius: 4px;
            border-left: 3px solid #00d4ff;
        }

        h2 {
            font-size: 1.1em;
            color: #00d4ff;
            margin: 0;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 212, 255, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: #0099ff;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>♟️ Entrenador de Ajedrez Profesional</h1>
    </div>

    <div class="main-container">
        <div class="board-section">
            <div class="board-and-eval">
                <div class="chessboard" id="board"></div>
                
                <div class="eval-bar-vertical">
                    <div class="eval-label">Evaluación</div>
                    <div class="eval-bar-container">
                        <div class="eval-bar-fill" id="evalBarFill"></div>
                    </div>
                    <div class="eval-score" id="evalScore">0.00</div>
                    <div class="eval-info" id="evalInfo">Blancas 50%</div>
                </div>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label>Modo</label>
                    <select id="gameMode" onchange="resetGame()">
                        <option value="coach">Entrenador</option>
                        <option value="vs-ia">vs IA</option>
                        <option value="free">Libre</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Nivel</label>
                    <select id="difficulty">
                        <option value="1">Novato</option>
                        <option value="2">Intermedio</option>
                        <option value="3" selected>Avanzado</option>
                        <option value="4">Experto</option>
                        <option value="5">Maestro</option>
                    </select>
                </div>
                <button onclick="resetGame()" class="full-width">🔄 Nueva</button>
                <button onclick="requestHint()" class="full-width">💡 Pista</button>
            </div>
        </div>

        <div class="panels-container">
            <div class="stats-panel">
                <h2>🎯 Entrenador</h2>
                
                <div id="coachMessage" class="coach-message">
                    <strong>¡Bienvenido!</strong>
                    Realiza tu primer movimiento.
                </div>

                <div class="stats-quick">
                    <div class="stat-quick-box">
                        <strong id="moveCount">0</strong>
                        <span>Movs</span>
                    </div>
                    <div class="stat-quick-box">
                        <strong id="accuracy">0%</strong>
                        <span>Precisión</span>
                    </div>
                    <div class="stat-quick-box">
                        <strong id="goodMoves">0</strong>
                        <span>Buenos</span>
                    </div>
                    <div class="stat-quick-box">
                        <strong id="badMoves">0</strong>
                        <span>Errores</span>
                    </div>
                </div>

                <div style="margin-top: auto; display: flex; gap: 10px;">
                    <button onclick="undoMove()" class="secondary" style="flex: 1;">↶ Deshacer</button>
                    <button onclick="flipBoard()" class="secondary" style="flex: 1;">🔄 Girar</button>
                </div>
            </div>

            <div class="stats-panel">
                <h2>📜 Movimientos</h2>
                <div class="move-history" id="moveHistory">
                    <p style="color: #888; text-align: center;">Movimientos aquí...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const game = new Chess();
        let selectedSquare = null;
        let highlights = [];
        let lastFromSquare = null;
        let lastToSquare = null;
        let moveCount = 0;
        let goodMoves = 0;
        let badMoves = 0;
        let boardFlipped = false;
        let aiThinking = false;
        let lastEval = 0;

        const pieceSymbols = {
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔',
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚'
        };

        // ===================== EVALUACIÓN REALISTA =====================
        function evaluatePosition() {
            const board = game.board();
            let score = 0;
            const pieceValues = { 'p': 1, 'n': 3, 'b': 3.25, 'r': 5, 'q': 9, 'k': 0 };
            
            // Material
            for (let row of board) {
                for (let piece of row) {
                    if (!piece) continue;
                    const val = pieceValues[piece.type] || 0;
                    score += piece.color === 'w' ? val : -val;
                }
            }

            // Movilidad
            const moves = game.moves();
            score += moves.length * 0.02;

            // Rey expuesto
            if (game.in_check()) {
                score += game.turn() === 'w' ? -0.5 : 0.5;
            }

            return score;
        }

        // ===================== BUSCAR MEJOR MOVIMIENTO (Minimax) =====================
        function getBestMoveMinimaxSimple(depth = 3) {
            const moves = game.moves({ verbose: true });
            if (!moves.length) return null;

            let best = moves[0];
            let bestScore = -Infinity;

            for (let move of moves) {
                game.move(move);
                const score = -evaluatePosition();
                game.undo();

                if (score > bestScore) {
                    bestScore = score;
                    best = move;
                }
            }

            return best;
        }

        // ===================== RENDER BOARD =====================
        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const r = boardFlipped ? 7 - row : row;
                    const c = boardFlipped ? 7 - col : col;
                    const square = String.fromCharCode(97 + c) + (8 - r);
                    const piece = game.get(square);

                    const squareEl = document.createElement('div');
                    squareEl.className = 'square ' + ((r + c) % 2 === 0 ? 'light' : 'dark');

                    if (selectedSquare === square) squareEl.classList.add('selected');
                    if (highlights.includes(square)) squareEl.classList.add('highlight');
                    if ((square === lastFromSquare || square === lastToSquare) && moveCount > 0) {
                        squareEl.classList.add('last-move');
                    }

                    if (piece) {
                        squareEl.textContent = pieceSymbols[piece.type];
                        squareEl.style.color = piece.color === 'w' ? '#fff' : '#000';
                        squareEl.style.textShadow = piece.color === 'w' ? '2px 2px 4px #000' : '1px 1px 3px #fff';
                    }

                    squareEl.addEventListener('click', () => handleSquareClick(square));
                    boardEl.appendChild(squareEl);
                }
            }
        }

        // ===================== HANDLE CLICK =====================
        function handleSquareClick(square) {
            if (aiThinking || game.game_over()) return;

            const piece = game.get(square);

            if (selectedSquare && piece && game.get(selectedSquare).color === piece.color) {
                selectedSquare = square;
                highlights = game.moves({ square, verbose: true }).map(m => m.to);
            } else if (selectedSquare) {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });

                if (move) {
                    lastFromSquare = selectedSquare;
                    lastToSquare = square;
                    moveCount++;
                    selectedSquare = null;
                    highlights = [];

                    evaluateMoveQuality(move);

                    const mode = document.getElementById('gameMode').value;
                    if ((mode === 'vs-ia' || mode === 'coach') && !game.game_over()) {
                        aiThinking = true;
                        setTimeout(makeAIMove, 1200);
                    }

                    updateUI();
                } else {
                    selectedSquare = null;
                    highlights = [];
                }
            } else if (piece && piece.color === game.turn()) {
                selectedSquare = square;
                highlights = game.moves({ square, verbose: true }).map(m => m.to);
            }

            renderBoard();
        }

        // ===================== EVALUAR MOVIMIENTO =====================
        function evaluateMoveQuality(move) {
            const evalBefore = lastEval;
            const evalAfter = evaluatePosition();
            const diff = evalAfter - evalBefore;

            let quality = 'good';
            if (diff > 0.8) quality = 'excellent';
            else if (diff < -1) quality = 'blunder';
            else if (diff < -0.3) quality = 'mistake';

            if (quality === 'excellent' || quality === 'good') goodMoves++;
            else badMoves++;

            lastEval = evalAfter;
            giveCoachFeedback(quality);
        }

        function giveCoachFeedback(type) {
            const mode = document.getElementById('gameMode').value;
            if (mode === 'free') return;

            const msgs = {
                excellent: '✅ ¡Excelente! Mejor movimiento.',
                good: '✅ Buen movimiento.',
                mistake: '⚠️ No es la mejor opción.',
                blunder: '❌ ¡Error grave!'
            };

            const coachMsg = document.getElementById('coachMessage');
            coachMsg.textContent = msgs[type];
            coachMsg.className = 'coach-message ' + (type === 'excellent' || type === 'good' ? 'good' : 'bad');
        }

        // ===================== IA =====================
        function makeAIMove() {
            if (game.game_over()) { aiThinking = false; return; }

            const difficulty = parseInt(document.getElementById('difficulty').value);
            const moves = game.moves({ verbose: true });
            
            if (!moves.length) { aiThinking = false; return; }

            let move;
            if (difficulty === 5) {
                move = getBestMoveMinimaxSimple(4);
            } else {
                const topN = [3, 5, 10, 15, 20][difficulty - 1];
                move = moves[Math.floor(Math.random() * Math.min(topN, moves.length))];
            }

            game.move(move);
            lastFromSquare = move.from;
            lastToSquare = move.to;
            moveCount++;
            lastEval = evaluatePosition();

            updateUI();
            aiThinking = false;

            if (game.game_over()) {
                alert('🏁 Partida terminada');
            }
        }

        // ===================== UPDATE UI =====================
        function updateUI() {
            renderBoard();
            updateEvalBar();
            updateMoveHistory();
            updateStats();
        }

        function updateEvalBar() {
            const score = evaluatePosition();
            const percentage = Math.max(0, Math.min(100, 50 + score * 10));
            
            const fillEl = document.getElementById('evalBarFill');
            fillEl.style.height = percentage + '%';
            fillEl.textContent = Math.abs(score).toFixed(2);
            
            if (score > 0.3) {
                fillEl.className = 'eval-bar-fill';
            } else {
                fillEl.className = 'eval-bar-fill black-advantage';
            }

            document.getElementById('evalScore').textContent = score.toFixed(2);
            
            const winProb = Math.round(50 + Math.min(Math.max(score * 10, -50), 50));
            document.getElementById('evalInfo').textContent = 'Blancas ' + winProb + '%';
        }

        function updateMoveHistory() {
            const hist = document.getElementById('moveHistory');
            hist.innerHTML = '';
            const history = game.history({ verbose: true });
            
            if (history.length === 0) {
                hist.innerHTML = '<p style="color: #888; text-align: center;">Movimientos aquí...</p>';
                return;
            }

            history.forEach((move, idx) => {
                const div = document.createElement('div');
                div.className = 'move-item';
                const moveNum = Math.floor(idx / 2) + 1;
                const color = idx % 2 === 0 ? '⚪' : '⚫';
                div.textContent = `${color} ${moveNum}. ${move.san}`;
                hist.appendChild(div);
            });
        }

        function updateStats() {
            document.getElementById('moveCount').textContent = moveCount;
            const total = goodMoves + badMoves;
            document.getElementById('accuracy').textContent = total > 0 ? 
                Math.round((goodMoves / total) * 100) + '%' : '0%';
            document.getElementById('goodMoves').textContent = goodMoves;
            document.getElementById('badMoves').textContent = badMoves;
        }

        function resetGame() {
            game.reset();
            selectedSquare = null;
            highlights = [];
            lastFromSquare = null;
            lastToSquare = null;
            moveCount = 0;
            goodMoves = 0;
            badMoves = 0;
            aiThinking = false;
            lastEval = 0;

            document.getElementById('coachMessage').innerHTML = '<strong>🎮 Nueva partida</strong> ¡A jugar!';
            updateUI();
        }

        function undoMove() {
            if (aiThinking) return;
            game.undo();
            game.undo();
            moveCount = Math.max(0, moveCount - 2);
            updateUI();
        }

        function flipBoard() {
            boardFlipped = !boardFlipped;
            renderBoard();
        }

        function requestHint() {
            if (game.game_over() || aiThinking) return;
            const best = getBestMoveMinimaxSimple();
            if (!best) return;
            
            selectedSquare = best.from;
            highlights = [best.to];
            renderBoard();
            
            const coachMsg = document.getElementById('coachMessage');
            coachMsg.innerHTML = '<strong>💡 Pista:</strong> ' + best.san;
            coachMsg.className = 'coach-message good';
        }

        renderBoard();
        updateUI();
    </script>
</body>
</html>
